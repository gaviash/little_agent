name : CI CD

on :
  push :
    branches :
      - main
  workflow_dispatch:

jobs :
  test :
    runs-on: ubuntu-latest

    steps :
      - name : recup le repo
        uses : actions/checkout@v6

      - name : install python
        uses : actions/python-setup@v6
        with :
          python-version : 3.11.9
          cache : pip
        
      - name : dependances
        run : pip install -r requirements.txt

      - name : lint
        run : ruff check 
      
      - name : test 
        run : pytest tests -q